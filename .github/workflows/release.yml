name: Release

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: stellarstackoss

jobs:
  # -------------------------------------------------------------------------
  # API + Panel + Daemon images. Run in parallel via matrix; each builds its
  # own Dockerfile, tags it `:latest` on main and `:vX.Y.Z` + `:<sha>` on
  # tagged releases. Cached via the registry buildcache so reruns are cheap.
  # -------------------------------------------------------------------------
  images:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: .
            dockerfile: apps/api/Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: panel
            context: .
            dockerfile: apps/web/Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: daemon
            context: apps/daemon
            dockerfile: apps/daemon/Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          short="${GITHUB_SHA::7}"
          base="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}"
          tags=()
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/}"
            tags+=("${base}:${version}")
            tags+=("${base}:latest")
          elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
            tags+=("${base}:latest")
            tags+=("${base}:edge")
          fi
          tags+=("${base}:${short}")
          ( IFS=$'\n'; printf 'tags<<EOF\n%s\nEOF\n' "${tags[*]}" ) >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:buildcache,mode=max
          provenance: false
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

  # -------------------------------------------------------------------------
  # Standalone daemon binaries. The installer's "daemon" mode pulls these
  # from this repo's GitHub releases when run on a host that's not running
  # the daemon in Docker. Built only on tagged releases.
  # -------------------------------------------------------------------------
  daemon-binaries:
    name: Daemon binary (${{ matrix.goos }}/${{ matrix.goarch }})
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: apps/daemon/go.sum

      - name: Build
        working-directory: apps/daemon
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p ../../dist
          go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF#refs/tags/} -X main.commit=${GITHUB_SHA::7}" \
            -o "../../dist/stellar-daemon-${{ matrix.goos }}-${{ matrix.goarch }}" \
            ./cmd/stellar-daemon

      - name: SHA-256
        run: |
          cd dist
          sha256sum "stellar-daemon-${{ matrix.goos }}-${{ matrix.goarch }}" \
            > "stellar-daemon-${{ matrix.goos }}-${{ matrix.goarch }}.sha256"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/stellar-daemon-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/stellar-daemon-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
