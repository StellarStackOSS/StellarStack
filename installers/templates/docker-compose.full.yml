# Full-stack: panel + api + daemon + Postgres + Redis + Caddy.
#
# Generated by the StellarStack installer. Re-running the installer will
# overwrite this file but never overwrites .env.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ../../var/lib/stellarstack/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - ../../var/lib/stellarstack/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: ghcr.io/stellarstackoss/api:latest
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"

  panel:
    image: ghcr.io/stellarstackoss/panel:latest
    restart: unless-stopped
    env_file: .env
    expose:
      - "5173"

  daemon:
    image: ghcr.io/stellarstackoss/daemon:latest
    restart: unless-stopped
    env_file: .env
    privileged: true # docker-in-docker is not used; this lets the daemon bind-mount sockets
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../var/lib/stellarstack/servers:/var/lib/stellarstack/servers
      - ../../var/lib/stellarstack/backups:/var/lib/stellarstack/backups
    expose:
      - "8443"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../var/lib/stellarstack/caddy:/data
    depends_on:
      - api
      - panel
      - daemon
