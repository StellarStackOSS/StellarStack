name: build java

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches: [main]
    paths:
      - java/**
      - games/hytale/**
      - .github/workflows/java.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/stellarstackoss/planets

jobs:
  java:
    name: "planets:java_${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag:
          - "8"
          - 8j9
          - "11"
          - 11j9
          - "16"
          - 16j9
          - "17"
          - 17j9
          - "18"
          - 18j9
          - "19"
          - 19j9
          - "21"
          - "22"
          - "23"
          - "24"
          - "25"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./java
          file: ./java/${{ matrix.tag }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:java_${{ matrix.tag }}
          provenance: false

  # Hytale's image FROMs `planets:java_25`, so it has to publish *after*
  # that tag exists. Keeping it here means a single workflow run owns
  # the dependency: java_25 always finishes first, then hytale picks
  # it up cleanly on every rebuild.
  hytale:
    name: "planets:games_hytale"
    needs: java
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./games/hytale
          file: ./games/hytale/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:games_hytale
          provenance: false
