name: build games

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches: [main]
    paths:
      - games/rust/**
      - games/source/**
      - .github/workflows/games.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/stellarstackoss/planets

# `games/hytale` is intentionally NOT here — it FROMs `planets:java_25`
# so it lives in `java.yml` after the java matrix succeeds. Everything
# in this workflow is amd64-only because Source-engine and Rust pull in
# :i386 packages that aren't published in the arm64 Debian archives.
jobs:
  games:
    name: "planets:games_${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: [rust, source]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./games/${{ matrix.tag }}
          file: ./games/${{ matrix.tag }}/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:games_${{ matrix.tag }}
          provenance: false
