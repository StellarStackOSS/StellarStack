name: build installers

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches: [main]
    paths:
      - installers/**
      - .github/workflows/installers.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/stellarstackoss/planets

jobs:
  installers:
    name: "planets:installers_${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `installers/debian` pulls in :i386 packages (lib32gcc-s1,
        # libsdl2-2.0-0:i386) that aren't published in the arm64 Debian
        # archives — pin it to amd64. Alpine has no such constraint.
        include:
          - tag: alpine
            platforms: linux/amd64,linux/arm64
          - tag: debian
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./installers/${{ matrix.tag }}
          file: ./installers/${{ matrix.tag }}/Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ env.IMAGE }}:installers_${{ matrix.tag }}
          provenance: false
