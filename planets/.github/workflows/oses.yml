name: build oses

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches: [main]
    paths:
      - oses/**
      - .github/workflows/oses.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/stellarstackoss/planets

jobs:
  oses:
    name: "planets:oses_${{ matrix.tag }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: [alpine, debian]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./oses/${{ matrix.tag }}
          file: ./oses/${{ matrix.tag }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE }}:oses_${{ matrix.tag }}
          provenance: false
